<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="../img/logo/attnlg.jpg" rel="icon">
    <title>Change Password - Demo</title>
    <link href="../vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="../css/ruang-admin.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="page-top" class="bg-gray-100">
    <div id="wrapper">
        <div id="content-wrapper" class="flex flex-col w-full">
            <div id="content">
                <div id="topbar-container"></div>
                <!-- Container Fluid-->
                <div class="container mx-auto p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-2xl font-bold text-gray-800">Change Password</h1>
                        <nav class="flex" aria-label="Breadcrumb">
                            <ol class="inline-flex items-center space-x-1">
                                <li><a href="dashboard.html" class="text-blue-500 hover:text-blue-700">Home</a></li>
                                <li><span class="mx-2 text-gray-400">/</span><span class="text-gray-500">Settings</span></li>
                            </ol>
                        </nav>
                    </div>

                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <div class="card shadow-2xl border-0 rounded-2xl overflow-hidden">
                                <div class="bg-gradient-primary p-6">
                                    <h6 class="m-0 font-bold text-white text-lg">Update Security Credentials</h6>
                                </div>
                                <div class="card-body p-8 bg-white">
                                    <div id="statusMsg"></div>
                                    <form id="passForm" class="space-y-6">
                                        <div class="form-group">
                                            <label class="block text-gray-700 font-bold mb-2">Current Password:</label>
                                            <div class="relative">
                                                <input type="password" id="currPass" class="form-control py-3 rounded-lg border-gray-200" required>
                                                <i class="fas fa-lock absolute right-4 top-4 text-gray-300"></i>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="block text-gray-700 font-bold mb-2">New Password:</label>
                                            <div class="relative">
                                                <input type="password" id="newPass" class="form-control py-3 rounded-lg border-gray-200" required>
                                                <i class="fas fa-shield-alt absolute right-4 top-4 text-gray-300"></i>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="block text-gray-700 font-bold mb-2">Confirm New Password:</label>
                                            <div class="relative">
                                                <input type="password" id="confPass" class="form-control py-3 rounded-lg border-gray-200" required>
                                                <i class="fas fa-check-circle absolute right-4 top-4 text-gray-300"></i>
                                            </div>
                                        </div>
                                        <div class="pt-4">
                                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-1">
                                                Update Password
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="footer-container"></div>
        </div>
    </div>

    <script src="../vendor/jquery/jquery.min.js"></script>
    <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="../js/ruang-admin.min.js"></script>
    <script src="../js/components.js"></script>
    <script>
        $('#passForm').submit(function(e) {
            e.preventDefault();
            if ($('#newPass').val() !== $('#confPass').val()) {
                $('#statusMsg').html('<div class="alert alert-danger rounded-lg mb-4">Passwords do not match.</div>');
                return;
            }
            $('#statusMsg').html('<div class="alert alert-success rounded-lg mb-4 shadow">Password updated successfully! (Demo Mode)</div>');
            this.reset();
            setTimeout(() => { $('#statusMsg').html(''); }, 3000);
        });
    </script>
</body>

</html>
