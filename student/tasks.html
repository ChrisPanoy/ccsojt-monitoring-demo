<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="../img/logo/attnlg.jpg" rel="icon">
    <title>Task Submission - Demo</title>
    <link href="../vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="../css/ruang-admin.min.css" rel="stylesheet">
    <link href="../vendor/datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="page-top" class="bg-gray-100">
    <div id="wrapper">
        <div id="content-wrapper" class="flex flex-col w-full">
            <div id="content">
                <div id="topbar-container"></div>
                <div class="container mx-auto p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-2xl font-bold text-gray-800">Task Submission</h1>
                    </div>

                    <div class="row">
                        <div class="col-lg-12">
                            <!-- Task List -->
                            <div class="card shadow-lg border-0 rounded-2xl mb-6">
                                <div class="card-header py-4 bg-white border-b border-gray-100">
                                    <h6 class="m-0 font-bold text-indigo-600">Pending Tasks</h6>
                                </div>
                                <div class="table-responsive p-4">
                                    <table class="table align-items-center table-flush table-hover" id="dataTableHover">
                                        <thead class="bg-gray-50">
                                            <tr>
                                                <th class="border-0">Task Code</th>
                                                <th class="border-0">Task Name</th>
                                                <th class="border-0">Description</th>
                                                <th class="border-0">Deadline</th>
                                                <th class="border-0">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr class="hover:bg-indigo-50 transition-colors">
                                                <td class="font-mono text-indigo-500 font-bold">TASK-001</td>
                                                <td class="font-bold">Weekly Performance Review</td>
                                                <td>Submit your self-assessment for the first month of OJT.</td>
                                                <td><span class="text-red-500 font-bold">Mar 25, 2026</span></td>
                                                <td><button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700" onclick="alert('Demo: Opening Submission Form...')">COMPLY</button></td>
                                            </tr>
                                            <tr class="hover:bg-indigo-50 transition-colors">
                                                <td class="font-mono text-indigo-500 font-bold">TASK-002</td>
                                                <td class="font-bold">Final Project Plan</td>
                                                <td>Detailed proposal for the capstone project.</td>
                                                <td><span class="text-orange-500 font-bold">Apr 10, 2026</span></td>
                                                <td><button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700" onclick="alert('Demo: Opening Submission Form...')">COMPLY</button></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- Submit Card (Hidden by default in demo, shows when COMPLY is clicked) -->
                            <div class="card shadow-lg border-0 rounded-2xl">
                                <div class="card-header py-4 bg-white border-b border-gray-100">
                                    <h6 class="m-0 font-bold text-primary">Submit Resource File</h6>
                                </div>
                                <div class="card-body p-6">
                                    <form id="uploadForm">
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label class="block text-sm font-bold text-gray-700 mb-2">Task Code</label>
                                                <input type="text" class="form-control py-3 rounded-lg bg-gray-50 border-0" value="TASK-001" readonly>
                                            </div>
                                            <div>
                                                <label class="block text-sm font-bold text-gray-700 mb-2">Student ID</label>
                                                <input type="text" class="form-control py-3 rounded-lg bg-gray-50 border-0" value="2021-0001" readonly>
                                            </div>
                                        </div>
                                        <div class="mb-4">
                                            <label class="block text-sm font-bold text-gray-700 mb-2">Select File</label>
                                            <div class="flex items-center justify-center w-full">
                                                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-200 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-indigo-50 transition-colors">
                                                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                                        <i class="fas fa-cloud-upload-alt text-gray-400 text-2xl mb-2"></i>
                                                        <p class="text-sm text-gray-500">Click to upload or drag and drop</p>
                                                    </div>
                                                    <input type="file" class="hidden" />
                                                </label>
                                            </div>
                                        </div>
                                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all transform hover:-translate-y-1">
                                            Submit Task
                                        </button>
                                    </form>
                                    <div id="statusMsg" class="mt-4"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="footer-container"></div>
        </div>
    </div>

    <script src="../vendor/jquery/jquery.min.js"></script>
    <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="../js/ruang-admin.min.js"></script>
    <script src="../vendor/datatables/jquery.dataTables.min.js"></script>
    <script src="../vendor/datatables/dataTables.bootstrap4.min.js"></script>
    <script src="../js/components.js"></script>
    <script>
        $(document).ready(function () {
            $('#dataTableHover').DataTable();
            $('#uploadForm').submit(function(e) {
                e.preventDefault();
                $('#statusMsg').html('<div class="alert alert-success rounded-lg shadow">Task submitted successfully! (Demo Mode)</div>');
                setTimeout(() => { $('#statusMsg').html(''); document.getElementById('uploadForm').reset(); }, 3000);
            });
        });
    </script>
</body>

</html>
