<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="../img/logo/attnlg.jpg" rel="icon">
    <title>Report to Admin - Demo</title>
    <link href="../vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="../css/ruang-admin.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="page-top" class="bg-gray-100">
    <div id="wrapper">
        <div id="content-wrapper" class="flex flex-col w-full">
            <div id="content">
                <!-- TopBar -->
                <div id="topbar-container"></div>
                <!-- Topbar -->

                <!-- Container Fluid-->
                <div class="container mx-auto p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-2xl font-bold text-gray-800">Send a Message to Admin</h1>
                        <nav class="flex" aria-label="Breadcrumb">
                            <ol class="inline-flex items-center space-x-1">
                                <li><a href="dashboard.html" class="text-blue-500 hover:text-blue-700">Home</a></li>
                                <li><span class="mx-2 text-gray-400">/</span><span class="text-gray-500">Report to Admin</span></li>
                            </ol>
                        </nav>
                    </div>

                    <div class="row">
                        <div class="col-lg-12">
                            <div class="card mb-4 shadow-xl border-t-4 border-blue-600">
                                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between bg-white border-0">
                                    <h6 class="m-0 font-weight-bold text-primary text-xl">New Message</h6>
                                </div>
                                <div class="card-body p-6">
                                    <div id="statusMsg"></div>
                                    <form id="reportForm">
                                        <div class="form-group mb-4">
                                            <label class="block text-gray-700 font-bold mb-2" for="fullname">Full Name:</label>
                                            <input type="text" class="form-control bg-gray-50 py-3 rounded-lg" id="fullname" value="Demo Student" readonly>
                                        </div>
                                        <div class="form-group mb-4">
                                            <label class="block text-gray-700 font-bold mb-2" for="course">Section:</label>
                                            <select class="form-control bg-gray-50 py-3 rounded-lg border-gray-200" id="course" required>
                                                <option value="">Select a course</option>
                                                <option value="BSIT - 4A">BSIT - 4A</option>
                                                <option value="BSCS - 4B">BSCS - 4B</option>
                                            </select>
                                        </div>
                                        <div class="form-group mb-4">
                                            <label class="block text-gray-700 font-bold mb-2" for="report">Message:</label>
                                            <textarea class="form-control bg-gray-50 p-4 rounded-lg border-gray-200" id="report" rows="5" placeholder="Enter your message here..." required></textarea>
                                        </div>
                                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition-all transform hover:-translate-y-1">
                                            Send Message
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="footer-container"></div>
        </div>
    </div>

    <script src="../vendor/jquery/jquery.min.js"></script>
    <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="../js/ruang-admin.min.js"></script>
    <script src="../js/components.js"></script>
    <script>
        $(document).ready(function() {
            $('#reportForm').on('submit', function(e) {
                e.preventDefault();
                $('#statusMsg').html('<div class="alert alert-success p-4 rounded-lg shadow">Message sent successfully! (Demo Mode)</div>');
                $('#report').val('');
                setTimeout(() => { $('#statusMsg').html(''); }, 3000);
            });
        });
    </script>
</body>

</html>
