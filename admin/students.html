<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="OJT Monitoring System - Static Demo">
  <meta name="author" content="Antigravity">
  <link href="../img/logo/attnlg.jpg" rel="icon">
  <title>Manage Students - Demo</title>
  <link href="../vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css">
  <link href="../css/ruang-admin.min.css" rel="stylesheet">
  <link href="../vendor/datatables/dataTables.bootstrap4.min.css" rel="stylesheet">
</head>

<body id="page-top">
  <div id="wrapper">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    <!-- Sidebar -->
    <div id="content-wrapper" class="d-flex flex-column">
      <div id="content">
        <!-- TopBar -->
        <div id="topbar-container"></div>
        <!-- Topbar -->

        <!-- Container Fluid-->
        <div class="container-fluid" id="container-wrapper">
          <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800">Student Entry</h1>
            <div id="statusMsg"></div>
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
              <li class="breadcrumb-item active" aria-current="page">Student Entry</li>
            </ol>
          </div>

          <div class="row">
            <div class="col-lg-12">
              <div class="card mb-4">
                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                  <h6 class="m-0 font-weight-bold text-primary">Create Students</h6>
                </div>
                <div class="card-body">
                  <form id="studentForm">
                    <div class="form-group row mb-3">
                      <div class="col-xl-6">
                        <label class="form-control-label">School ID Number<span class="text-danger ml-2">*</span></label>
                        <input type="text" class="form-control" name="admissionNumber" required>
                      </div>
                      <div class="col-xl-6">
                        <label class="form-control-label">Select Company<span class="text-danger ml-2">*</span></label>
                        <select required name="comp_name" class="form-control mb-3">
                          <option value="">--Select Company--</option>
                          <option value="Tech Corp">Tech Corp</option>
                          <option value="Innovate Inc">Innovate Inc</option>
                        </select>
                      </div>
                    </div>
                    <div class="form-group row mb-3">
                      <div class="col-xl-6">
                        <label class="form-control-label">Firstname<span class="text-danger ml-2">*</span></label>
                        <input type="text" class="form-control" name="firstName" required>
                      </div>
                      <div class="col-xl-6">
                        <label class="form-control-label">Lastname<span class="text-danger ml-2">*</span></label>
                        <input type="text" class="form-control" name="lastName" required>
                      </div>
                    </div>
                    <div class="form-group row mb-3">
                        <div class="col-xl-6">
                          <label class="form-control-label">Contact Number<span class="text-danger ml-2">*</span></label>
                          <input type="text" class="form-control" name="contact" required>
                        </div>
                        <div class="col-xl-6">
                          <label class="form-control-label">Email Address<span class="text-danger ml-2">*</span></label>
                          <input type="email" class="form-control" name="email" required>
                        </div>
                      </div>
                    <button type="submit" class="btn btn-primary">Save Student</button>
                  </form>
                </div>
              </div>

              <!-- All Students Table -->
              <div class="card mb-4">
                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                  <h6 class="m-0 font-weight-bold text-primary">All Students</h6>
                </div>
                <div class="table-responsive p-3">
                  <table class="table align-items-center table-flush table-hover" id="dataTableHover">
                    <thead class="thead-light">
                      <tr>
                        <th>#</th>
                        <th>Student ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Company</th>
                        <th>Email</th>
                        <th>Action</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td>1</td>
                        <td>2021-0001</td>
                        <td>John</td>
                        <td>Doe</td>
                        <td>Tech Corp</td>
                        <td>john@demo.com</td>
                        <td>
                          <a href="#"><i class="fas fa-edit"></i></a>
                          <a href="#" class="text-danger ml-2"><i class="fas fa-trash"></i></a>
                        </td>
                      </tr>
                      <tr>
                        <td>2</td>
                        <td>2021-0002</td>
                        <td>Jane</td>
                        <td>Smith</td>
                        <td>Innovate Inc</td>
                        <td>jane@demo.com</td>
                        <td>
                          <a href="#"><i class="fas fa-edit"></i></a>
                          <a href="#" class="text-danger ml-2"><i class="fas fa-trash"></i></a>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!---Container Fluid-->
      </div>
      <div id="footer-container"></div>
    </div>
  </div>

  <script src="../vendor/jquery/jquery.min.js"></script>
  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../vendor/jquery-easing/jquery.easing.min.js"></script>
  <script src="../js/ruang-admin.min.js"></script>
  <script src="../vendor/datatables/jquery.dataTables.min.js"></script>
  <script src="../vendor/datatables/dataTables.bootstrap4.min.js"></script>
  <script src="../js/components.js"></script>
  <script>
    $(document).ready(function () {
      $('#dataTableHover').DataTable();
      
      $('#studentForm').on('submit', function(e) {
        e.preventDefault();
        $('#statusMsg').html('<div class="alert alert-success">Student created successfully! (Demo Mode)</div>');
        this.reset();
        setTimeout(() => {
          $('#statusMsg').html('');
        }, 3000);
      });
    });
  </script>
</body>

</html>
