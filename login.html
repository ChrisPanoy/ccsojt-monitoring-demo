<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="OJT Monitoring System - Static Demo">
  <meta name="author" content="Antigravity">
  <link href="img/logo/attnlg.jpg" rel="icon">
  <title>OJT-MS - Login Demo</title>
  <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css">
  <link href="css/ruang-admin.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4e73df;
      --secondary-color: #858796;
      --success-color: #1cc88a;
      --info-color: #36b9cc;
      --warning-color: #f6c23e;
      --danger-color: #e74a3b;
      --dark-color: #5a5c69;
    }

    body.bg-gradient-login {
      background: linear-gradient(135deg, #4e73df 10%, #224abe 100%);
      background-size: cover;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-login {
      width: 100%;
      max-width: 500px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.175) !important;
      overflow: hidden;
    }

    .login-form {
      padding: 3rem 2.5rem !important;
    }

    .form-control-user {
      border-radius: 10rem;
      padding: 1.5rem 1.25rem;
    }

    .btn-login {
      font-size: 0.8rem;
      border-radius: 10rem;
      padding: 0.75rem 1rem;
      transition: all 0.3s;
      background: var(--success-color);
      border-color: var(--success-color);
      color: white;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
    }

    .btn-login:hover {
      background: #17a673;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(28, 200, 138, 0.4);
    }

    .login-logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .system-title {
      font-weight: 800;
      color: #3a3b45;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      color: #858796;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .alert-box {
        display: none;
        margin-bottom: 1rem;
    }
  </style>
</head>

<body class="bg-gradient-login">
  <div class="container-login">
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="login-form">
          <div class="text-center">
            <img src="img/logo/src-logo.jpg" class="login-logo">
            <h5 class="system-title">OJT MONITORING SYSTEM</h5>
            <p class="login-subtitle">Secure Access Portal</p>
          </div>
          
          <div id="loginAlert" class="alert alert-danger alert-box" role="alert">
            Invalid Username/Password!
          </div>

          <form id="loginForm" class="user">
            <div class="form-group">
              <input type="email" class="form-control form-control-user" id="email" 
                aria-describedby="emailHelp" placeholder="Enter Email Address" required>
            </div>
            <div class="form-group">
              <input type="password" class="form-control form-control-user" id="password" 
                placeholder="Password" required>
            </div>
            <div class="form-group mt-4">
              <button type="submit" class="btn btn-login btn-block">
                Login
              </button>
            </div>
          </form>
          <hr>
          <div class="text-center">
            <a class="small font-weight-bold text-primary" href="#">Forgot Password?</a>
          </div>
          <div class="mt-4 text-center">
              <small class="text-muted">Demo Credentials:</small><br>
              <small class="text-muted">admin@demo.com | student@demo.com | teacher@demo.com</small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
  <script src="js/ruang-admin.min.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.toLowerCase();
      const password = document.getElementById('password').value;
      const alert = document.getElementById('loginAlert');

      // Simple demo login logic
      if (email === 'admin@demo.com') {
        localStorage.setItem('userType', 'Admin');
        localStorage.setItem('userName', 'Admin User');
        window.location.href = 'admin/dashboard.html';
      } else if (email === 'student@demo.com') {
        localStorage.setItem('userType', 'Student');
        localStorage.setItem('userName', 'Student Demo');
        window.location.href = 'student/dashboard.html';
      } else if (email === 'teacher@demo.com') {
        localStorage.setItem('userType', 'ClassTeacher');
        localStorage.setItem('userName', 'Teacher Demo');
        window.location.href = 'teacher/dashboard.html';
      } else {
        alert.style.display = 'block';
        setTimeout(() => {
          alert.style.display = 'none';
        }, 3000);
      }
    });
  </script>
</body>

</html>
